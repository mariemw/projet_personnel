<div class="page">
    <form (ngSubmit)="login()">
        <h1 class="title">Connexion</h1>
        <p class="subtitle">Accédez à votre espace de gestion de projets</p>
        <div class="container">
            <label for="uname"><b>Nom d'utilisateur</b></label>
            <input type="text" [(ngModel)]="userName" placeholder="Entrer nom d'utilisateur" name="uname" required>
            <label><b>Mot de passe</b></label>
            <input type="password" [(ngModel)]="password" placeholder="Entrer le mot de passe" name="psw" required>
            <button type="submit">Connexion</button>
                <span class="inscription"><a routerLink="/register">Vous n’avez pas de compte ? S’inscrire</a></span>
        </div>
    </form>

</div>
@if(showInfoPopup){
    <div class="overlay">
        <app-info-popup
            [message]="popupMessage"
            [type]="popupType"
            (close)="showInfoPopup = false">
        </app-info-popup>
    </div>
}
