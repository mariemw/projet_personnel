<div class="popup-container">
  <div class="popup-icon">
    <mat-icon>warning_amber</mat-icon>
  </div>

  <div class="popup-text">
    {{text}}
  </div>

  <div class="btns">
    <button class="yes-btn" (click)="onConfirm()">
      Confirmer
    </button>

    <button class="no-btn" (click)="onCancel()">
      Annuler
    </button>
  </div>
</div>
